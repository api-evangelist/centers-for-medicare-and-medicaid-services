description: Machine-readable plans and pricing scaffold for this API provider. Conforms to the API Commons
  Plans schema. Tier limits and prices are scaffold defaults; replace with provider-published values.
plans:
  - id: centers-for-medicare-and-medicaid-services-free
    name: Free
    type: freemium
    description: Free entry tier for the Centers for Medicare and Medicaid Services API surface. Intended
      for evaluation, prototyping, and low-volume integrations. Real limits and pricing must be reconciled
      with the provider's published plan documentation.
    entries:
      - label: API Requests
        description: Monthly API request quota across all included endpoints
        name: api_requests
        type: quota
        metric: requests
        limit: 1000
        timeFrame: month
        geo: global
        domains:
          - https://api.bluebutton.cms.gov/v2/fhir/
          - https://api.bcda.cms.gov/api/v2/
          - https://api.dpc.cms.gov/api/v1/
          - https://data.cms.gov/data.json
          - https://data.cms.gov/provider-data/api/1/
          - https://npiregistry.cms.hhs.gov/api/
          - https://marketplace.api.healthcare.gov/api/v1/
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Rate Limit
        description: Maximum requests per minute on the free tier
        name: rate_limit
        type: rate
        metric: requests_per_minute
        limit: 10
        timeFrame: minute
        geo: global
        domains:
          - https://api.bluebutton.cms.gov/v2/fhir/
          - https://api.bcda.cms.gov/api/v2/
          - https://api.dpc.cms.gov/api/v1/
          - https://data.cms.gov/data.json
          - https://data.cms.gov/provider-data/api/1/
          - https://npiregistry.cms.hhs.gov/api/
          - https://marketplace.api.healthcare.gov/api/v1/
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Public Documentation
      - name: Community Support
      - name: Sandbox Access
      - name: CMS Blue Button 2.0 API
      - name: CMS Beneficiary Claims Data API (BCDA)
      - name: CMS Data at the Point of Care (DPC) API
      - name: CMS Socrata Open Data API (data.cms.gov)
      - name: CMS Provider Data Catalog API (Care Compare)
      - name: NPPES NPI Registry API
      - name: Healthcare.gov Marketplace API
      - name: CMS Quality Payment Program (QPP) Measures API
